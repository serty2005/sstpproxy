name: sstpproxy

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - backend

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 1
      PING: 1
      VERSION: 1
      INFO: 0
      EVENTS: 0
      IMAGES: 0
      NETWORKS: 0
      NODES: 0
      SERVICES: 0
      TASKS: 0
      VOLUMES: 0
      BUILD: 0
      AUTH: 0
      DISTRIBUTION: 0
      EXEC: 0
      PLUGINS: 0
      SECRETS: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
    tmpfs:
      - /run:rw,noexec,nosuid,size=8m
      - /tmp:rw,noexec,nosuid,size=8m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  sstp-egress:
    image: ${SSTP_EGRESS_IMAGE}
    pull_policy: always
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/ppp:/dev/ppp
    security_opt:
      # pppd/sstpc используют PPP ioctls через /dev/ppp, которые стандартный seccomp Docker
      # часто блокирует, поэтому профиль оставлен unconfined.
      - seccomp:unconfined
      - no-new-privileges:true
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
      net.ipv6.conf.all.disable_ipv6: "1"
      net.ipv6.conf.default.disable_ipv6: "1"
    environment:
      REMOTEHOST: ${SSTP_REMOTEHOST}
      USER: ${SSTP_USERNAME}
      PASSWORD: ${SSTP_PASSWORD}
      XRAY_PORT: ${XRAY_PORT}
      MTG_PORT: ${MTG_PORT}
    ports:
      - "${XRAY_PORT}:${XRAY_PORT}/tcp"
      - "${MTG_PORT}:${MTG_PORT}/tcp"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    tmpfs:
      - /run:rw,noexec,nosuid,size=16m
      - /tmp:rw,noexec,nosuid,size=16m
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/sstp-healthcheck"]
      interval: 20s
      timeout: 8s
      retries: 3
      start_period: 45s
    stop_grace_period: 20s
    networks:
      edge:
      telegram-egress:
        aliases:
          - telegram-proxy

  telegram-proxy:
    image: ${TELEGRAM_PROXY_IMAGE}
    pull_policy: always
    restart: unless-stopped
    network_mode: "service:sstp-egress"
    depends_on:
      sstp-egress:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3128"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=8m
      - /run:rw,noexec,nosuid,size=8m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  xray-edge:
    image: ghcr.io/xtls/xray-core:${XRAY_IMAGE_TAG}
    container_name: xray-edge
    restart: unless-stopped
    user: "10001:10001"
    network_mode: "service:sstp-egress"
    depends_on:
      control-plane:
        condition: service_healthy
      sstp-egress:
        condition: service_started
    command: ["run", "-c", "/etc/xray/config.json"]
    volumes:
      - xray-generated:/etc/xray:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "xray run -test -config /etc/xray/config.json >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  mtg-edge:
    image: nineseconds/mtg:${MTG_IMAGE_TAG}
    container_name: mtg-edge
    restart: unless-stopped
    user: "10001:10001"
    network_mode: "service:sstp-egress"
    depends_on:
      control-plane:
        condition: service_healthy
      sstp-egress:
        condition: service_started
    command: ["run", "/etc/mtg/mtg.toml"]
    volumes:
      - mtg-generated:/etc/mtg:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "mtg access /etc/mtg/mtg.toml >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  control-plane-init:
    image: ${CONTROL_PLANE_IMAGE}
    pull_policy: always
    user: "0:0"
    environment:
      MTPROTO_SECRET_VALUE: ${MTPROTO_SECRET_VALUE:-}
    command:
      - sh
      - -ec
      - |
        mkdir -p /srv/xray/generated/history
        mkdir -p /srv/mtg/generated/history
        mkdir -p /srv/secrets/reality
        mkdir -p /srv/secrets/mtproto
        if [ -z "$${MTPROTO_SECRET_VALUE}" ]; then
          echo "Ошибка: не задан MTPROTO_SECRET_VALUE" >&2
          exit 1
        fi
        printf '%s' "$${MTPROTO_SECRET_VALUE}" > /srv/secrets/mtproto/secret
        chmod 700 /srv/secrets/reality /srv/secrets/mtproto
        chmod 600 /srv/secrets/mtproto/secret
        chown -R 10001:10001 /srv/xray/generated /srv/mtg/generated /srv/secrets/reality /srv/secrets/mtproto
    restart: "no"
    volumes:
      - xray-generated:/srv/xray/generated
      - mtg-generated:/srv/mtg/generated
      - reality-secrets:/srv/secrets/reality
      - mtproto-secrets:/srv/secrets/mtproto

  control-plane:
    image: ${CONTROL_PLANE_IMAGE}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      control-plane-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
      sstp-egress:
        condition: service_started
      telegram-proxy:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      HTTP_LISTEN_ADDR: ${HTTP_LISTEN_ADDR:-:8080}
      STORAGE_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      SQLITE_PATH: /var/lib/control-plane/control-plane.db
      MIGRATIONS_DIR: /srv/control-plane/migrations
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-http://telegram-proxy:3128}
      CONTROL_PLANE_ADMIN_TOKEN: ${CONTROL_PLANE_ADMIN_TOKEN}
      PUBLIC_HOST: ${PUBLIC_HOST}
      XRAY_PORT: ${XRAY_PORT}
      XRAY_FLOW: xtls-rprx-vision
      XRAY_CLIENT_FP: chrome
      XRAY_REALITY_DEST: ${XRAY_REALITY_DEST}
      XRAY_REALITY_SERVER_NAMES: ${XRAY_REALITY_SERVER_NAMES}
      XRAY_SERVER_TEMPLATE: /srv/xray/templates/config.json.tmpl
      XRAY_NEKORAY_TEMPLATE: /srv/xray/templates/client/nekoray.json.tmpl
      XRAY_HIDDIFY_TEMPLATE: /srv/xray/templates/client/hiddify.json.tmpl
      XRAY_V2RAYN_TEMPLATE: /srv/xray/templates/client/v2rayn.json.tmpl
      XRAY_ACTIVE_CONFIG_PATH: /srv/xray/generated/config.json
      XRAY_ARCHIVE_DIR: /srv/xray/generated/history
      XRAY_BINARY_PATH: /usr/local/bin/xray
      XRAY_CONTAINER_NAME: xray-edge
      REALITY_KEYSET_NAME: primary
      REALITY_SECRET_DIR: /srv/secrets/reality
      REALITY_PRIVATE_KEY_FILE_NAME: active.key
      MTPROTO_TEMPLATE: /srv/mtg/templates/mtg.toml.tmpl
      MTPROTO_ACTIVE_CONFIG_PATH: /srv/mtg/generated/mtg.toml
      MTPROTO_ARCHIVE_DIR: /srv/mtg/generated/history
      MTPROTO_PORT: ${MTG_PORT}
      MTPROTO_PUBLIC_HOST: ${PUBLIC_HOST}
      MTPROTO_SECRET_FILE: /srv/secrets/mtproto/secret
      MTPROTO_SECRET_NAME: primary
      MTPROTO_CONTAINER_NAME: mtg-edge
      DOCKER_API_BASE_URL: http://docker-socket-proxy:2375
      DOCKER_RESTART_TIMEOUT_SECONDS: ${DOCKER_RESTART_TIMEOUT_SECONDS:-20}
      REALITY_SHORT_ID_POOL_SIZE: ${REALITY_SHORT_ID_POOL_SIZE:-64}
      REALITY_SHORT_ID_BYTES: ${REALITY_SHORT_ID_BYTES:-8}
    volumes:
      - xray-generated:/srv/xray/generated
      - mtg-generated:/srv/mtg/generated
      - reality-secrets:/srv/secrets/reality
      - mtproto-secrets:/srv/secrets/mtproto:ro
      - control-plane-data:/var/lib/control-plane
    ports:
      - "127.0.0.1:${CONTROL_PLANE_PORT}:8080/tcp"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --connect-timeout 2 --max-time 3 http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 4s
      retries: 6
      start_period: 15s
    networks:
      - backend
      - telegram-egress
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /run:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  backend:
    internal: true
  telegram-egress:
    internal: true
  edge:

volumes:
  postgres-data:
  control-plane-data:
  xray-generated:
  mtg-generated:
  reality-secrets:
  mtproto-secrets:
